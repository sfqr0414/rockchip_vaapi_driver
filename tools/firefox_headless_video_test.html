<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Firefox VA-API Playback Test</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Noto Sans", sans-serif;
      background: #11161c;
      color: #eef3f8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(90, 140, 180, 0.28), transparent 40%),
        linear-gradient(180deg, #11161c, #06080b);
    }

    main {
      width: min(960px, calc(100vw - 32px));
      display: grid;
      gap: 16px;
      padding: 24px;
      border-radius: 18px;
      background: rgba(10, 14, 18, 0.84);
      box-shadow: 0 18px 70px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    p {
      margin: 0;
      color: #b8c3cf;
    }

    video {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 14px;
    }

    .status {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      font: 14px/1.5 "JetBrains Mono", monospace;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #7cc7ff;
      color: #0b141b;
      font: 600 14px/1 "Noto Sans", sans-serif;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>Firefox VA-API Playback Test</h1>
    <p>这页会直接显示是否真的在播、当前播放时间、以及出错信息。</p>
    <video id="sample" controls muted autoplay playsinline preload="auto"></video>
    <div class="actions">
      <button id="play">Play</button>
      <button id="restart">Restart</button>
    </div>
    <div id="status" class="status">initializing...</div>
  </main>
  <script>
    const video = document.getElementById('sample');
    const status = document.getElementById('status');
    const playButton = document.getElementById('play');
    const restartButton = document.getElementById('restart');
    const params = new URLSearchParams(window.location.search);
    const requestedVideo = params.get('video');
    const videoPath = requestedVideo ? `../videos/${requestedVideo}` : '../videos/Test Jellyfin 1080p AVC 20M.mp4';
    const sourceUrl = new URL(videoPath, window.location.href).href;
    const seekAtParam = params.get('seekAt');
    const seekToParam = params.get('seekTo');
    const restartOnEndedParam = params.get('restartOnEnded');
    const seekAt = seekAtParam === null ? Number.NaN : Number(seekAtParam);
    const seekTo = seekToParam === null ? Number.NaN : Number(seekToParam);
    const restartOnEnded = restartOnEndedParam === '1' || restartOnEndedParam === 'true';
    const seekEnabled = Number.isFinite(seekAt) && Number.isFinite(seekTo) && seekAt >= 0 && seekTo >= 0;
    const recentEvents = [];
    const decodeTelemetry = {
      available: false,
      active: false,
      interruptDelta: 0,
      matchingLines: [],
      updatedAt: null,
      seenActive: false,
    };
    let lastPostedAt = 0;
    let seekTriggered = false;
    let seekCompleted = false;

    async function postStatus(payload) {
      try {
        await fetch('/__status__', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch {
      }
    }

    function renderStatus(extra = '') {
      const quality = video.getVideoPlaybackQuality ? video.getVideoPlaybackQuality() : null;
      const decoded = quality ? quality.totalVideoFrames : 'n/a';
      const dropped = quality ? quality.droppedVideoFrames : 'n/a';
      const frameDelay = quality && typeof quality.totalFrameDelay === 'number'
        ? quality.totalFrameDelay.toFixed(3)
        : 'n/a';
      const error = video.error ? `${video.error.code}: ${video.error.message || 'media error'}` : 'none';
      const interruptSources = decodeTelemetry.matchingLines.length
        ? decodeTelemetry.matchingLines.join(' | ')
        : 'none';
      status.textContent = [
        `src: ${sourceUrl}`,
        `readyState: ${video.readyState}`,
        `networkState: ${video.networkState}`,
        `paused: ${video.paused}`,
        `ended: ${video.ended}`,
        `currentTime: ${video.currentTime.toFixed(3)}`,
        `duration: ${Number.isFinite(video.duration) ? video.duration.toFixed(3) : 'n/a'}`,
        `resolution: ${video.videoWidth}x${video.videoHeight}`,
        `decodedVideoFrames: ${decoded}`,
        `droppedVideoFrames: ${dropped}`,
        `totalFrameDelay: ${frameDelay}`,
        `seekEnabled: ${seekEnabled}`,
        `seekTriggered: ${seekTriggered}`,
        `seekCompleted: ${seekCompleted}`,
        `seekTarget: ${seekEnabled ? seekTo.toFixed(3) : 'n/a'}`,
        `hardwareDecodeActive: ${decodeTelemetry.active}`,
        `hardwareDecodeSeen: ${decodeTelemetry.seenActive}`,
        `interruptDelta: ${decodeTelemetry.interruptDelta}`,
        `interruptSources: ${interruptSources}`,
        `restartOnEnded: ${restartOnEnded}`,
        `error: ${error}`,
        extra,
        `events: ${recentEvents.join(', ')}`
      ].filter(Boolean).join('\n');
      document.title = `VAAPI t=${video.currentTime.toFixed(2)} p=${video.paused ? 1 : 0} d=${decoded} drop=${dropped}`;

      const now = Date.now();
      if (now - lastPostedAt >= 500) {
        lastPostedAt = now;
        postStatus({
          timestamp: now,
          src: sourceUrl,
          readyState: video.readyState,
          networkState: video.networkState,
          paused: video.paused,
          ended: video.ended,
          currentTime: Number(video.currentTime.toFixed(3)),
          duration: Number.isFinite(video.duration) ? Number(video.duration.toFixed(3)) : null,
          videoWidth: video.videoWidth,
          videoHeight: video.videoHeight,
          decodedVideoFrames: quality ? quality.totalVideoFrames : null,
          droppedVideoFrames: quality ? quality.droppedVideoFrames : null,
          totalFrameDelay: quality && typeof quality.totalFrameDelay === 'number'
            ? Number(quality.totalFrameDelay.toFixed(3))
            : null,
          seekEnabled,
          seekTriggered,
          seekCompleted,
          seekTarget: seekEnabled ? Number(seekTo.toFixed(3)) : null,
          hardwareDecodeActive: decodeTelemetry.active,
          hardwareDecodeSeen: decodeTelemetry.seenActive,
          interruptDelta: decodeTelemetry.interruptDelta,
          interruptSources: decodeTelemetry.matchingLines,
          restartOnEnded,
          error,
          events: [...recentEvents]
        });
      }
    }

    function note(eventName) {
      if (eventName === 'seeked') {
        seekCompleted = true;
      }
      recentEvents.push(eventName);
      if (recentEvents.length > 8) {
        recentEvents.shift();
      }
      renderStatus();
    }

    async function ensurePlayback() {
      try {
        await video.play();
        note('play() ok');
      } catch (error) {
        note(`play() failed: ${error && error.message ? error.message : error}`);
      }
    }

    async function refreshDecodeTelemetry() {
      try {
        const response = await fetch('/__telemetry__', { cache: 'no-store' });
        if (!response.ok) {
          return;
        }
        const payload = await response.json();
        decodeTelemetry.available = Boolean(payload.available);
        decodeTelemetry.active = Boolean(payload.active);
        decodeTelemetry.interruptDelta = Number(payload.interrupt_delta || 0);
        decodeTelemetry.matchingLines = Array.isArray(payload.matching_lines) ? payload.matching_lines : [];
        decodeTelemetry.updatedAt = payload.updated_at || null;
        decodeTelemetry.seenActive = decodeTelemetry.seenActive || decodeTelemetry.active;
        renderStatus();
      } catch {
      }
    }

    function maybeTriggerSeek() {
      if (!seekEnabled || seekTriggered || video.seeking || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
        return;
      }
      if (video.currentTime >= seekAt) {
        seekTriggered = true;
        note(`seek-request:${seekTo.toFixed(3)}`);
        video.currentTime = seekTo;
      }
    }

    video.src = sourceUrl;

    [
      'loadstart',
      'loadedmetadata',
      'loadeddata',
      'canplay',
      'canplaythrough',
      'play',
      'playing',
      'pause',
      'waiting',
      'stalled',
      'seeking',
      'seeked',
      'ended',
      'error',
      'timeupdate'
    ].forEach((eventName) => {
      video.addEventListener(eventName, () => {
        note(eventName);
        if (eventName === 'ended' && restartOnEnded) {
          video.currentTime = 0;
          ensurePlayback();
        }
        if (eventName === 'timeupdate' || eventName === 'loadeddata' || eventName === 'playing') {
          maybeTriggerSeek();
        }
      });
    });

    playButton.addEventListener('click', ensurePlayback);
    restartButton.addEventListener('click', async () => {
      video.currentTime = 0;
      await ensurePlayback();
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && video.paused && !video.ended) {
        ensurePlayback();
      }
      renderStatus(`visibility: ${document.visibilityState}`);
    });

    setInterval(() => renderStatus(), 250);
    setInterval(maybeTriggerSeek, 100);
    setInterval(refreshDecodeTelemetry, 500);
    refreshDecodeTelemetry();
    ensurePlayback();
  </script>
</body>
</html>
